apiVersion: v1
kind: ServiceAccount
metadata:
  name: patcher
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: secret-creator
rules:
- apiGroups: [""]
  resources: ["oidc-client-secret"]
  verbs: ["get", "watch", "update", "patch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: patcher-secret-creator
subjects:
  - kind: ServiceAccount
    name: patcher
    namespace: openshift-config
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-creator
