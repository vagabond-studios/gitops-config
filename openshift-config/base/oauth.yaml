apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-options: Delete=false,ServerSideApply=true
spec:
  identityProviders:
    - name: oidc-keycloak
      mappingMethod: claim
      type: OpenID
      openID:
        ca:
          name: trust-bundle
        clientID: ocp-oauth
        clientSecret:
          name: oidc-client-secret
        extraScopes: []
        issuer: https://keycloak-ingress-keycloak.apps-crc.testing/realms/vagabond-studios
        claims:
          preferredUsername:
            - preferred_username
          name:
            - name
          email:
            - email
          groups:
            - groups
